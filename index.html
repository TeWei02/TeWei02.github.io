function setLang(lang) {
  localStorage.setItem('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.innerText = messages[lang][key] || el.innerText;
  });
  if (lang === 'en') document.title = messages.en.title;
  else document.title = messages['zh-TW'].title;
}

const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = () => {
  const isDark = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
  themeToggle.innerText = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
};

const backToTop = document.getElementById('backToTop');
window.onscroll = () => {
  backToTop.style.display = window.scrollY > 300 ? 'block' : 'none';
};
backToTop.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// Init
const savedLang = localStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh-TW' : 'en');
setLang(savedLang);
const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.dataset.theme = savedTheme;
themeToggle.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
